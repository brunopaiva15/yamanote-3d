# Déploiement GitHub Pages : build Vite puis publication du dossier dist.
# Prérequis (une seule fois) : Settings → Pages → Source : « GitHub Actions ».

name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
  # Lancement manuel depuis l'onglet Actions (utile pour la première mise en ligne
  # ou pour déployer une autre branche).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on n'annule pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (tsc + vite)
        run: npm run build

      - name: Configuration de Pages
        uses: actions/configure-pages@v5
        with:
          # Active GitHub Pages (source « GitHub Actions ») au premier passage
          # si ce n'est pas déjà fait dans Settings → Pages.
          enablement: true

      - name: Envoi de l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Déploiement sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
